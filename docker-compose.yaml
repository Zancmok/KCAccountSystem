services:
  flask:
    build:
      context: ./src/
      dockerfile: ./Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    command: bash -c "python ./main.py"
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_DATABASE: database
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_PASSWORD: admin
      MYSQL_USER: admin
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
