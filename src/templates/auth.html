<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KCAccountSystem/Auth</title>
</head>
<body>
    <form>
        <label for="username">Username (3 to 32 characters):</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          minlength="3"
          maxlength="32"/>
        <br>

        <label for="password">Password (6 to 32 characters):</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="6"
          maxlength="32"/>
        <br>

        <button type="button">Login</button>
        <button type="button">Signup</button>
    </form>
</body>
</html>
